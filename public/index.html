<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>陸上計時 QR同期版</title>
    <!-- QRコード生成ライブラリ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #111; color: white; margin: 0; text-align: center; }
        .screen { display: none; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .active { display: flex; }
        #timer { font-size: 70px; font-family: monospace; margin: 10px; font-weight: bold; }
        .viewport { position: relative; width: 100%; max-width: 500px; aspect-ratio: 16/9; background: #000; border: 2px solid #444; }
        video { width: 100%; height: 100%; object-fit: contain; }
        .guide-line { position: absolute; left: 50%; top: 0; width: 2px; height: 100%; background: orange; z-index: 10; }
        button { padding: 15px 30px; font-size: 18px; border-radius: 10px; border: none; cursor: pointer; margin: 10px; font-weight: bold; width: 100%; max-width: 300px; }
        .btn-blue { background: #007bff; color: white; }
        .btn-red { background: #dc3545; color: white; }
        #qrcode { background: white; padding: 10px; margin: 20px; }
        .controls { display: flex; gap: 10px; justify-content: center; }
        .btn-small { width: auto; background: #444; color: white; padding: 10px 20px; }
    </style>
</head>
<body>

    <!-- ルーム作成・選択画面 -->
    <div id="setup-screen" class="screen active">
        <h1>陸上計時ツール</h1>
        <button class="btn-blue" onclick="setupStart()">スタート端末 (A) として起動</button>
        <p>または</p>
        <p>Chromebookに表示されたQRを<br>スマホで読み取ってください</p>
    </div>

    <!-- スタート待機画面 (Chromebook) -->
    <div id="start-wait-screen" class="screen">
        <h2>ルームID: <span id="disp-room-id"></span></h2>
        <div id="qrcode"></div>
        <p id="start-status">スマホの接続を待っています...</p>
        <button id="start-seq-btn" class="btn-blue" style="display:none;">スタートシーケンス開始</button>
        <div id="timer-start">00.000</div>
    </div>

    <!-- ゴール計測画面 (スマホ) -->
    <div id="goal-screen" class="screen">
        <div id="timer">00.000</div>
        <div class="viewport">
            <video id="preview" autoplay playsinline muted></video>
            <div class="guide-line"></div>
        </div>
        <button id="manual-stop-btn" class="btn-red">GOAL / STOP</button>
        <p id="goal-status">待機中...</p>
    </div>

    <!-- フレーム調整画面 -->
    <div id="adjust-screen" class="screen">
        <h2>フレーム調整</h2>
        <div class="viewport"><video id="playback" playsinline></video><div class="guide-line"></div></div>
        <div id="adjust-time" style="font-size: 40px; color: #00ff00; margin: 10px;">00.000</div>
        <div class="controls">
            <button class="btn-small" onclick="step(-0.1)">≪</button>
            <button class="btn-small" onclick="step(-0.016)">＜</button>
            <button class="btn-small" onclick="step(0.016)">＞</button>
            <button class="btn-small" onclick="step(0.1)">≫</button>
        </div>
        <button onclick="location.href='index.html'" style="background:#28a745; color:white;">次の計測へ</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let roomId = new URLSearchParams(window.location.search).get('room');
        let role = new URLSearchParams(window.location.search).get('role');
        let offset = 0, raceStartTime = 0, videoStartTime = 0, tapTime = 0, timerInterval = null;
        let mediaRecorder, recordedChunks = [];
        const gunSound = new Audio('https://actions.google.com/sounds/v1/weapons/fire_arm_gunshot.ogg');

        // 起動時の判定
        window.onload = () => {
            if (roomId && role === 'goal') {
                setupGoal(roomId);
            }
        };

        // --- スタート端末の設定 ---
        function setupStart() {
            roomId = Math.random().toString(36).substring(2, 7).toUpperCase();
            document.getElementById('setup-screen').classList.remove('active');
            document.getElementById('start-wait-screen').classList.add('active');
            document.getElementById('disp-room-id').innerText = roomId;
            
            // QRコード生成
            const joinUrl = `${window.location.origin}/index.html?role=goal&room=${roomId}`;
            new QRCode(document.getElementById("qrcode"), { text: joinUrl, width: 200, height: 200 });

            socket.emit('join_room', roomId);
            document.getElementById('start-seq-btn').style.display = "block";
            startSync();
        }

        // --- ゴール端末の設定 ---
        async function setupGoal(rId) {
            roomId = rId;
            document.getElementById('setup-screen').classList.remove('active');
            document.getElementById('goal-screen').classList.add('active');
            socket.emit('join_room', roomId);
            startSync();
            initCamera();
        }

        function startSync() {
            setInterval(() => socket.emit("sync", { c: Date.now(), roomId }), 2000);
            socket.on("sync_res", (data) => {
                const rtt = (Date.now() - data.c) / 2;
                offset = data.s - (data.c + rtt);
            });
        }

        // --- スタートシーケンス ---
        document.getElementById('start-seq-btn').onclick = async () => {
            // 音声アンロック
            gunSound.play().then(() => { gunSound.pause(); gunSound.currentTime = 0; });
            
            speak("On your marks");
            await new Promise(r => setTimeout(r, 3000));
            speak("Set");
            
            const randomDelay = 1500 + Math.random() * 1500;
            const bangTime = Date.now() + offset + randomDelay;
            socket.emit("start_signal", { roomId, startTime: bangTime });
        };

        function speak(m) {
            const u = new SpeechSynthesisUtterance(m);
            u.lang = 'en-US';
            window.speechSynthesis.speak(u);
        }

        socket.on("start_broadcast", (data) => {
            raceStartTime = data.startTime;
            recordedChunks = [];
            if (role === 'goal' && mediaRecorder) {
                mediaRecorder.start();
                videoStartTime = Date.now() + offset;
            }
            const wait = setInterval(() => {
                if (Date.now() + offset >= raceStartTime) {
                    clearInterval(wait);
                    if (role !== 'goal') gunSound.play().catch(() => speak("Bang"));
                    runDisplayTimer(raceStartTime, (role === 'goal' ? 'timer' : 'timer-start'));
                }
            }, 2);
        });

        // --- ストップ処理 ---
        document.getElementById('manual-stop-btn').onclick = () => {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                tapTime = Date.now() + offset;
                const finalTime = ((tapTime - raceStartTime) / 1000).toFixed(3);
                socket.emit("stop_signal", { roomId, finalTime });
                setTimeout(() => mediaRecorder.stop(), 1000);
            }
        };

        socket.on("stop_broadcast", (data) => {
            clearInterval(timerInterval);
            const target = (role === 'goal' ? 'timer' : 'timer-start');
            document.getElementById(target).innerText = data.finalTime;
        });

        // --- カメラ・録画 ---
        async function initCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
            document.getElementById('preview').srcObject = stream;
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
            mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
            mediaRecorder.onstop = () => {
                document.getElementById('goal-screen').classList.remove('active');
                document.getElementById('adjust-screen').classList.add('active');
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const playback = document.getElementById('playback');
                playback.src = URL.createObjectURL(blob);
                playback.onloadeddata = () => {
                    playback.currentTime = (tapTime - videoStartTime) / 1000;
                    updateAdjustTime();
                };
                playback.ontimeupdate = updateAdjustTime;
            };
        }

        function updateAdjustTime() {
            const t = (videoStartTime + (document.getElementById('playback').currentTime * 1000) - raceStartTime) / 1000;
            if (t > 0) document.getElementById('adjust-time').innerText = t.toFixed(3);
        }

        function step(v) { document.getElementById('playback').currentTime += v; }

        function runDisplayTimer(base, targetId) {
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const diff = (Date.now() + offset - base) / 1000;
                if(diff > 0) document.getElementById(targetId).innerText = diff.toFixed(3);
            }, 35);
        }
    </script>
</body>
</html>
