<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>陸上計時ツール v3.1</title>
    <style>
        body { font-family: sans-serif; background: #111; color: white; margin: 0; text-align: center; }
        .screen { display: none; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; }
        .active { display: flex; }
        
        #timer { font-size: 80px; font-family: monospace; margin: 10px; color: #fff; }
        #status { color: #00ff00; margin-bottom: 20px; font-size: 14px; }

        /* ビデオエリアの改善 */
        .viewport { position: relative; width: 95vw; max-width: 600px; aspect-ratio: 16/9; background: #000; border: 2px solid #444; }
        video { width: 100%; height: 100%; object-fit: contain; background: #000; }
        .guide-line { position: absolute; left: 50%; top: 0; width: 2px; height: 100%; background: orange; z-index: 10; pointer-events: none; }
        
        button { padding: 15px 30px; font-size: 18px; border-radius: 8px; border: none; cursor: pointer; margin: 5px; font-weight: bold; }
        .btn-start { background: #007bff; color: white; width: 80%; }
        .btn-stop { background: #dc3545; color: white; width: 80%; }
        .btn-confirm { background: #28a745; color: white; width: 80%; }
        .controls { margin-top: 15px; display: flex; gap: 10px; justify-content: center; }
        .btn-small { padding: 15px 25px; background: #444; color: white; font-size: 20px; }

        #final-record { font-size: 32px; color: yellow; margin: 10px; }
    </style>
</head>
<body>

    <!-- 1. メイン画面 -->
    <div id="main-screen" class="screen active">
        <h1 id="role-title">Loading...</h1>
        <div id="timer">00.000</div>
        <div id="status">同期中...</div>
        
        <button id="start-seq-btn" class="btn-start" style="display:none;">スタートシーケンス開始</button>
        
        <div id="goal-ui" style="display:none; width: 100%; flex-direction: column; align-items: center;">
            <div class="viewport">
                <video id="preview" autoplay playsinline muted></video>
                <div class="guide-line"></div>
            </div>
            <button id="manual-stop-btn" class="btn-stop" style="margin-top:20px;">GOAL / STOP</button>
        </div>
    </div>

    <!-- 2. フレーム微調整画面 -->
    <div id="adjust-screen" class="screen">
        <h2 style="margin: 10px;">フレーム調整</h2>
        <div class="viewport">
            <video id="playback" playsinline controls></video>
            <div class="guide-line"></div>
        </div>
        <div id="adjust-time" style="font-size: 40px; margin: 10px; color: yellow;">00.000</div>
        <div class="controls">
            <button class="btn-small" onclick="step(-0.1)">≪</button>
            <button class="btn-small" onclick="step(-0.016)">＜</button>
            <button class="btn-small" onclick="step(0.016)">＞</button>
            <button class="btn-small" onclick="step(0.1)">≫</button>
        </div>
        <button onclick="location.reload()" class="btn-confirm" style="margin-top:20px;">リセットして次へ</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const params = new URLSearchParams(window.location.search);
        const role = params.get('role');
        let offset = 0;
        let raceStartTime = 0;
        let videoStartTime = 0;
        let mediaRecorder;
        let recordedChunks = [];
        let timerInterval = null;

        // 音声の準備
        const gunSound = new Audio('https://actions.google.com/sounds/v1/weapons/fire_arm_gunshot.ogg'); // サンプル音源

        // 初期設定
        if (role === 'start') {
            document.getElementById('role-title').innerText = "スタート担当 (A)";
            document.getElementById('start-seq-btn').style.display = "block";
        } else {
            document.getElementById('role-title').innerText = "ゴール担当 (B)";
            document.getElementById('goal-ui').style.display = "flex";
            initCamera();
        }

        // 時刻同期
        setInterval(() => socket.emit("sync", Date.now()), 2000);
        socket.on("sync_res", (data) => {
            const rtt = (Date.now() - data.c) / 2;
            offset = data.s - (data.c + rtt);
            document.getElementById('status').innerText = "同期完了";
        });

        // --- スタート(A)側の送信処理 ---
        document.getElementById('start-seq-btn').onclick = async () => {
            const uttr = new SpeechSynthesisUtterance("On your marks");
            uttr.lang = 'en-US';
            window.speechSynthesis.speak(uttr);
            
            await new Promise(r => setTimeout(r, 3000));
            
            const uttr2 = new SpeechSynthesisUtterance("Set");
            uttr2.lang = 'en-US';
            window.speechSynthesis.speak(uttr2);

            const randomDelay = 1500 + Math.random() * 1500;
            const bangTime = Date.now() + offset + randomDelay;
            socket.emit("start_signal", { startTime: bangTime });
        };

        // --- 全端末共通：スタート信号受信 ---
        socket.on("start_broadcast", (data) => {
            raceStartTime = data.startTime;
            recordedChunks = [];
            
            if (role === 'goal') {
                mediaRecorder.start();
                videoStartTime = Date.now() + offset; 
            }
            
            const wait = setInterval(() => {
                if (Date.now() + offset >= raceStartTime) {
                    if (role === 'start') gunSound.play();
                    startDisplayTimer(raceStartTime);
                    clearInterval(wait);
                }
            }, 2);
        });

        // --- 全端末共通：ストップ信号受信 ---
        socket.on("stop_broadcast", (data) => {
            clearInterval(timerInterval);
            document.getElementById('timer').innerText = data.finalTime;
            document.getElementById('status').innerText = "計測終了";
            document.getElementById('status').style.color = "orange";
        });

        // --- ゴール(B)側のカメラ・停止処理 ---
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", frameRate: { ideal: 60 } }, 
                    audio: false 
                });
                document.getElementById('preview').srcObject = stream;
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
                mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
                mediaRecorder.onstop = showAdjustScreen;
            } catch (err) {
                alert("カメラの起動に失敗しました。HTTPSで接続しているか確認してください。");
            }
        }

        document.getElementById('manual-stop-btn').onclick = () => {
            if (mediaRecorder && mediaRecorder.state !== "inactive") {
                mediaRecorder.stop();
                const finalTime = document.getElementById('timer').innerText;
                socket.emit("stop_signal", { finalTime: finalTime });
            }
        };

        // --- ビデオ調整画面の表示 ---
        function showAdjustScreen() {
            document.getElementById('main-screen').classList.remove('active');
            document.getElementById('adjust-screen').classList.add('active');
            
            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const playback = document.getElementById('playback');
            playback.src = url;
            
            playback.ontimeupdate = () => {
                const currentVideoTime = playback.currentTime * 1000;
                // レースタイム = (ビデオ撮影開始時刻 + 今の再生位置) - 実際のスタート時刻
                const totalTime = (videoStartTime + currentVideoTime - raceStartTime) / 1000;
                if(totalTime > 0) {
                    document.getElementById('adjust-time').innerText = totalTime.toFixed(3);
                }
            };
        }

        function step(val) {
            const playback = document.getElementById('playback');
            playback.pause();
            playback.currentTime += val;
        }

        function startDisplayTimer(base) {
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const diff = (Date.now() + offset - base) / 1000;
                if(diff > 0) document.getElementById('timer').innerText = diff.toFixed(3);
            }, 30);
        }
    </script>
</body>
</html>
